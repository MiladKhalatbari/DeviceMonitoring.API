name: .NET CI
on:
    push:
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

env:
    DOTNET_CLI_TELEMETRY_OPTOUT: "1"
    DOTNET_NOLOGO: "true"

jobs:
    build-and-test:
        name: Build and test
        runs-on: ubuntu-latest
        timeout-minutes: 15
        services:
          sqlserver:
            image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
            env:
              ACCEPT_EULA: "Y"
              MSSQL_PID: Developer
              MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
            ports:
              - "1433:1433"
            options: >-
              --health-cmd "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1' || exit 1"
              --health-interval 10s
              --health-timeout 5s
              --health-retries 15
              --health-start-period 30s
        steps:
          - name: Checkout repository
            uses: actions/checkout@v6

          - name: Set up .NET
            uses: actions/setup-dotnet@v5
            with:
              dotnet-version: "10.0.x"

          - name: Restore dependencies
            run: dotnet restore

          - name: Build solution
            run: dotnet build --configuration Release --no-restore

          - name: Run unit and integration tests
            env:
              INTEGRATION_TEST_CONNECTION_STRING: "Server=127.0.0.1,1433;Database=DeviceMonitoringIntegrationTests;User Id=sa;Password=YourStrong!Passw0rd;Encrypt=False;TrustServerCertificate=True;Connect Timeout=30;"
            run: dotnet test --configuration Release --no-build --verbosity normal --logger "console;verbosity=detailed"